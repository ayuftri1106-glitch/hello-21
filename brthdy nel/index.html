<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special For Nayla 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffd6e7,#f3d9ff);
overflow:hidden;
position:relative;
}

/* Bintang */
.star{
position:absolute;
color:white;
animation:blink 2s infinite;
}

@keyframes blink{
0%,100%{opacity:.2;}
50%{opacity:1;}
}

/* Card */

.container{
width:90%;
max-width:600px;
padding:40px;
text-align:center;

background:rgba(255,255,255,.3);
backdrop-filter:blur(12px);

border-radius:30px;

box-shadow:
0 8px 32px rgba(0,0,0,.15);

z-index:2;
}

h1{
font-size:40px;
color:#ff4f81;
margin-bottom:15px;
}

h2{
color:#555;
margin-bottom:20px;
}

#typing{
color:#666;
line-height:1.8;
min-height:80px;
}

button{
margin-top:20px;
padding:14px 35px;
border:none;
border-radius:50px;
background:#ff4f81;
color:white;
font-size:17px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

/* Hati */

.heart{
position:absolute;
top:-50px;
font-size:25px;
animation:fall linear forwards;
pointer-events:none;
}

@keyframes fall{

to{
transform:translateY(110vh);
}

}

.glow{
animation:glow 2s infinite;
}

@keyframes glow{

0%{
transform:scale(1);
}

50%{
transform:scale(1.04);
}

100%{
transform:scale(1);
}

}

</style>
</head>
<body>

<div class="container">

<h1 class="glow">
🎂 Happy Birthday 🎂
</h1>

<h2>
Nayla Putri Syahillah Hsb 💖
</h2>

<p id="typing"></p>

<button onclick="mulai()" id="btn">
🎁 Buka Kejutan
</button>

</div>

<script>

/* Efek Ketik */

const text =
"Hai Nayla 💖, ada sebuah kejutan kecil yang sudah disiapkan khusus untukmu. Semoga kamu suka dengan perjalanan kecil ini ✨";

let i=0;

function ketik(){

if(i<text.length){

document.getElementById("typing").innerHTML +=
text.charAt(i);

i++;

setTimeout(ketik,50);

}

}

ketik();

/* Tombol */

function mulai(){

const btn =
document.getElementById("btn");

btn.innerHTML =
"💖 Menyiapkan Kejutan...";

btn.disabled=true;

setTimeout(()=>{

window.location.href=
"lilin.html";

},3000);

}

/* Hati */

function buatHati(){

const heart =
document.createElement("div");

heart.innerHTML="💖";

heart.classList.add("heart");

heart.style.left=
Math.random()*100+"vw";

heart.style.animationDuration=
(Math.random()*3+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

setInterval(buatHati,500);

/* Bintang */

for(let i=0;i<30;i++){

const star=
document.createElement("div");

star.innerHTML="✨";

star.className="star";

star.style.left=
Math.random()*100+"vw";

star.style.top=
Math.random()*100+"vh";

star.style.fontSize=
(Math.random()*15+10)+"px";

document.body.appendChild(star);

}

</script>

</body>
</html>
