<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#f3d9ff);
min-height:100vh;
padding:40px 20px;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
text-align:center;
}

h1{
color:#ff4f81;
font-size:42px;
margin-bottom:15px;
}

.subtitle{
color:#666;
margin-bottom:40px;
}

.gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.photo{

background:white;

padding:15px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.1);

transition:.4s;

transform:rotate(-2deg);

}

.photo:nth-child(even){

transform:rotate(2deg);

}

.photo:hover{

transform:scale(1.05);

}

.photo img{

width:100%;

height:320px;

object-fit:cover;

border-radius:15px;

}

.caption{

margin-top:10px;

color:#666;

font-size:15px;

}

button{

margin-top:50px;

padding:14px 35px;

border:none;

border-radius:50px;

background:#ff4f81;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.heart{

position:fixed;

top:-20px;

font-size:22px;

animation:fall linear forwards;

pointer-events:none;

}

@keyframes fall{

to{
transform:translateY(110vh);
}

}

</style>
